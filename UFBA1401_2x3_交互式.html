<meta charset="UTF-8">
<title>UFBA1401 草莓生长 2×3 动态图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft YaHei","SimHei",sans-serif;
    background:linear-gradient(135deg,#2c3e50 0%,#4ca1af 100%);
    min-height:100vh;padding:22px;}
.box{max-width:1680px;margin:0 auto;background:#fff;border-radius:18px;
     padding:26px;box-shadow:0 20px 70px rgba(0,0,0,.45);}
h1{text-align:center;color:#1a365d;margin-bottom:6px;font-size:25px;}
.subtitle{text-align:center;color:#4a5568;margin-bottom:18px;font-size:13px;}

.infobar{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;
         padding:14px 18px;border-radius:14px;margin-bottom:20px;
         display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;}
.cell{text-align:center;}
.cell .lab{font-size:12px;opacity:.9;margin-bottom:3px;}
.cell .val{font-size:19px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.ctrl{background:#f7fafc;border:1px solid #e2e8f0;padding:15px 18px;border-radius:14px;margin-bottom:20px;}
.row{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.row:last-child{margin-bottom:0;}
.btn{padding:8px 16px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px;
     transition:transform .12s,box-shadow .12s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn-p{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.btn-s{background:#edf2f7;color:#2d3748;border:1px solid #cbd5e0;}
.sb{padding:5px 11px;background:#fff;border:1.5px solid #cbd5e0;border-radius:6px;cursor:pointer;
    font-size:12px;font-weight:bold;color:#4a5568;}
.sb.active{background:#667eea;color:#fff;border-color:#667eea;}
.slider{flex:1;-webkit-appearance:none;height:10px;border-radius:5px;background:#e2e8f0;outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,#667eea,#764ba2);cursor:pointer;box-shadow:0 3px 8px rgba(102,126,234,.5);}
.slider::-webkit-slider-thumb:hover{transform:scale(1.1);}
.daybox{font-size:18px;font-weight:bold;color:#4c51bf;min-width:120px;text-align:center;
        background:#fff;padding:4px 10px;border-radius:8px;border:1.5px solid #c3dafe;}

.legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:16px;}
.legend .item{display:flex;align-items:center;gap:6px;padding:4px 12px;background:#f7fafc;
              border:1px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:bold;}
.legend .sq{width:14px;height:14px;border-radius:3px;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:10px 12px 14px;
      box-shadow:0 2px 10px rgba(0,0,0,.05);}
.card h3{text-align:center;color:#2d3748;margin-bottom:6px;font-size:14px;font-weight:bold;}
canvas{width:100%;height:auto;display:block;}
@media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:780px){.grid{grid-template-columns:1fr;}}

.foot{margin-top:20px;padding-top:14px;border-top:1px solid #e2e8f0;text-align:center;color:#718096;font-size:12px;}
</style>
</head>

function draw(idx) {
    const c = document.getElementById('c'+idx);
    const ctx = c.getContext('2d');
    const W=c.width, H=c.height;
    const pad = {top:26, right:16, bottom:38, left:68};
    const cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;
    const cur = parseInt(slider.value);
    const sp = SP[idx];
    const mn = sp.y_min, mx = sp.y_max;
    const toX = i => pad.left + (DATA.dap[i] - DATA.dap[0]) / Math.max(1, MAXDAY - DATA.dap[0]) * cw;
    const toY = v => pad.top + ch - ((v - mn) / (mx - mn)) * ch;

    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle = '#edf2f7'; ctx.lineWidth=1;
    for (let i=0;i<=5;i++){
        const y = pad.top + ch*i/5;
        ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    }
    ctx.strokeStyle = '#cbd5e0'; ctx.strokeRect(pad.left,pad.top,cw,ch);

    const end = Math.min(cur+1, N);
    sp.series.forEach(([col,cn,colr]) => {
        const arr = DATA[col]; if (!arr) return;
        ctx.strokeStyle = colr; ctx.lineWidth=2.3; ctx.lineJoin='round';
        ctx.beginPath();
        for (let i=0;i<end;i++){
            const x = toX(i), y = toY(arr[i] ?? 0);
            if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
        if (end>0) {
            const last = end-1;
            const x = toX(last), y = toY(arr[last] ?? 0);
            ctx.fillStyle = colr; ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
            ctx.fillStyle = colr; ctx.font='bold 11px "Microsoft YaHei",sans-serif'; ctx.textAlign='left';
            let txt = cn + ' ';
            if (sp.is_stage) {
                const si = Math.round(arr[last] ?? 0);
                const sn = STAGES[si] ?? String(si);
                txt += (SCN[sn] ?? sn);
            } else {
                txt += Number(arr[last] ?? 0).toFixed(4);
            }
            ctx.fillText(txt, x+8, y+4);
        }
    });

    // 阶段虚线（仅阶段子图）
    if (sp.is_stage) {
        ctx.strokeStyle='rgba(108,52,131,0.25)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
        let prev=-1;
        for (let i=0;i<end;i++){
            const v = Math.round(DATA.stage_i[i] ?? DATA[sp.series[0][0]][i]);
            if (v !== prev) {
                const x = toX(i);
                ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H-pad.bottom); ctx.stroke();
                prev = v;
            }
        }
        ctx.setLineDash([]);
    }

    // 水分胁迫：填充
    if (idx === 4 && sp.series[0]) {
        const col = sp.series[0][0]; const arr = DATA[col];
        ctx.fillStyle = 'rgba(228,26,28,0.18)';
        ctx.beginPath();
        for (let i=0;i<end;i++){
            const x = toX(i), y = toY(arr[i] ?? 0);
            if (i===0) { ctx.moveTo(x, toY(mn)); ctx.lineTo(x, y); }
            else ctx.lineTo(x,y);
        }
        if (end>0) { ctx.lineTo(toX(end-1), toY(mn)); }
        ctx.closePath(); ctx.fill();
    }

    const cx = toX(cur);
    ctx.strokeStyle='rgba(220,38,38,0.5)'; ctx.lineWidth=1.3;
    ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(cx,pad.top); ctx.lineTo(cx,H-pad.bottom); ctx.stroke();
    ctx.setLineDash([]);

    // 轴标签
    ctx.fillStyle='#1a202c';
    ctx.font='bold 12px "Microsoft YaHei",sans-serif'; ctx.textAlign='center';
    ctx.fillText(sp.ylabel, W/2, 15);
    ctx.font='11px "Microsoft YaHei",sans-serif';
    ctx.fillText('种植后天数 (天)', W/2, H-5);
    ctx.save(); ctx.translate(14, H/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(sp.ylabel, 0, 0); ctx.restore();

    // Y刻度
    ctx.textAlign='right'; ctx.fillStyle='#4a5568'; ctx.font='11px sans-serif';
    for (let i=0;i<=5;i++){
        const y = pad.top + ch*(5-i)/5;
        const val = mn + (mx-mn)*i/5;
        if (sp.is_stage) {
            const si = Math.round(val);
            if (si>=0 && si<STAGES.length) {
                ctx.fillText(SCN[STAGES[si]] ?? STAGES[si], pad.left-7, y+4);
            }
        } else {
            ctx.fillText(val.toFixed(3), pad.left-7, y+4);
        }
    }
    // X刻度
    ctx.textAlign='center';
    for (let i=0;i<=5;i++){
        const d = Math.round((N-1)*i/5);
        const x = toX(d);
        ctx.fillText(DATA.dap[d], x, H-pad.bottom+15);
    }
}

function updateInfo() {
    const cur = parseInt(slider.value);
    infoRef['day'].textContent   = DATA.dap[cur];
    infoRef['date'].textContent  = DATA.date[cur];
    const sname = DATA.stage[cur];
    infoRef['stage'].textContent = (SCN[sname] ?? sname);
    infoRef['tt'].textContent    = Math.round(DATA.thermal_time ? DATA.thermal_time[cur] : 0);
    infoRef['bio'].textContent   = (DATA.biomass[cur] ?? 0).toFixed(4);
    infoRef['lai'].textContent   = (DATA.leaf_area_index[cur] ?? 0).toFixed(4);
    infoRef['fno'].textContent   = (DATA.fruit_number[cur] ?? 0).toFixed(1);
    infoRef['crn'].textContent   = (DATA.crown_number[cur] ?? 0).toFixed(2);
    infoRef['rnn'].textContent   = (DATA.runner_number[cur] ?? 0).toFixed(2);
    infoRef['ws'].textContent    = (DATA.water_stress[cur] ?? 0).toFixed(3);
    document.getElementById('curD').textContent = DATA.dap[cur];
}

function updateAll() {
    updateInfo();
    for (let i=0;i<6;i++) draw(i);
}
updateAll();
</script>
